events {}

http {
    include mime.types;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;

        # Defense-in-depth response headers. `always` so they also cover error
        # responses. CSP is scoped to frame-ancestors only — a full script/style
        # CSP would break Next/Chakra inline assets.
        # 'self' (not 'none') so the OIDC silent-renew iframe can frame our own
        # same-origin pages; cross-origin framing stays blocked.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /socket.io/ {
            proxy_pass http://notifications:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /odds {
            proxy_pass http://odds:8000/odds;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # Stats projection. /stats/me/* require a Bearer token (verified by the
        # stats service); /stats/leaderboard is public. Token forwarded as-is.
        location /stats {
            proxy_pass http://stats:8000/stats;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        location /api/ {
            proxy_pass http://core:4000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # Keycloak under the /kc prefix (KC_HTTP_RELATIVE_PATH=/kc), same-origin
        # so the browser never leaves this host. Forward proto/host so Keycloak
        # (KC_PROXY_HEADERS=xforwarded) builds correct absolute URLs.
        location /kc/ {
            proxy_pass http://keycloak:8080/kc/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Everything else proxies to the host's `pnpm dev` server (port 3000).
        # The dev compose overlay maps the `frontend` hostname to
        # host-gateway. Upgrade headers needed for Turbopack HMR.
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
