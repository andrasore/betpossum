events {}

http {
    include mime.types;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;

        # Runtime config rendered at container start; never cached so the
        # browser always picks up the current Keycloak issuer / client ID.
        location = /config.js {
            add_header Cache-Control "no-store";
        }

        location /socket.io/ {
            proxy_pass http://notifications:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /odds {
            proxy_pass http://odds:8000/odds;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        location /api/ {
            proxy_pass http://core:4000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # Everything else proxies to the host's `pnpm dev` server (port 3000).
        # The dev compose overlay maps the `frontend` hostname to
        # host-gateway. Upgrade headers needed for Turbopack HMR.
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
