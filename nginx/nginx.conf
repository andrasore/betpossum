events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        # Docker's embedded DNS. Using a variable in proxy_pass forces nginx
        # to re-resolve via this resolver instead of caching the IP at config
        # load (which goes stale across container restarts).
        resolver 127.0.0.11 valid=10s ipv6=off;

        # WebSocket / long-polling traffic goes to the notifications service.
        location /socket.io/ {
            set $notifications_upstream http://notifications:8000;
            proxy_pass $notifications_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location / {
            set $core_upstream http://core:4000;
            proxy_pass $core_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }
    }
}
