events {}

http {
    include mime.types;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;

        # Defense-in-depth response headers. `always` so they also cover error
        # responses. CSP is scoped to frame-ancestors only — a full script/style
        # CSP would break Next/Chakra inline assets and the blocking config.js.
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Runtime config rendered at container start; never cached so the
        # browser always picks up the current Keycloak issuer / client ID.
        # NB: this block's own add_header resets inheritance, so the security
        # headers above must be repeated here to keep config.js covered.
        location = /config.js {
            add_header Cache-Control "no-store";
            add_header X-Frame-Options "DENY" always;
            add_header Content-Security-Policy "frame-ancestors 'none'" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        location /socket.io/ {
            proxy_pass http://notifications:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /odds {
            proxy_pass http://odds:8000/odds;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # Authenticated REST API to the core service. The browser attaches
        # Authorization: Bearer <access_token>; nginx forwards as-is.
        location /api/ {
            proxy_pass http://core:4000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # SPA static export.
        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }
    }
}
