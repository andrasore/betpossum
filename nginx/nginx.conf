events {}

http {
    include mime.types;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;

        # Runtime config rendered at container start; never cached so the
        # browser always picks up the current Keycloak issuer / client ID.
        location = /config.js {
            add_header Cache-Control "no-store";
        }

        location /socket.io/ {
            proxy_pass http://notifications:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /odds {
            proxy_pass http://odds:8000/odds;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # Authenticated REST API to the core service. The browser attaches
        # Authorization: Bearer <access_token>; nginx forwards as-is.
        location /api/ {
            proxy_pass http://core:4000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # SPA static export.
        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }
    }
}
