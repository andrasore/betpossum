events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        # Docker's embedded DNS. Using a variable in proxy_pass forces nginx
        # to re-resolve via this resolver instead of caching the IP at config
        # load (which goes stale across container restarts).
        resolver 127.0.0.11 valid=10s ipv6=off;

        # WebSocket / long-polling traffic goes to the notifications service.
        location /socket.io/ {
            set $notifications_upstream http://notifications:8000;
            proxy_pass $notifications_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Public odds API served by the standalone odds service.
        location /odds {
            set $odds_upstream http://odds:8000/odds;
            proxy_pass $odds_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # Everything else is the Next.js frontend. Upgrade headers are
        # required so Turbopack HMR's WebSocket survives the proxy.
        location / {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # NextAuth's /api/auth/callback/keycloak response carries a
            # JWT-bearing Set-Cookie that overflows the 4k default header
            # buffer; without this, nginx 502s on the post-login redirect.
            # Body buffers must match: proxy_busy_buffers_size defaults to
            # 2× the header buffer, which violates its own constraint
            # unless body buffers are bumped to keep up.
            proxy_buffer_size 16k;
            proxy_buffers     8 16k;
        }
    }
}
