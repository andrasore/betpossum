name: PR checks

on:
  pull_request:
  push:
    branches: [main]

env:
  COMPOSE_BAKE: 'true'

jobs:
  # Everything that runs against the source tree without a built Docker image:
  # typecheck, lint, the JS/Python build (regenerates bindings) and unit tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v4
        with:
          node-version: '25'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            services/core/node_modules
          key: node-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Cache Python venvs
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: |
            services/odds/.venv
            services/notifications/.venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('services/*/pyproject.toml', 'services/*/requirements.txt') }}

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Install deps (cache miss only)
        if: steps.cache-node.outputs.cache-hit != 'true' || steps.cache-venv.outputs.cache-hit != 'true'
        run: pnpm install && pnpm run init

      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run build
      - run: pnpm run test

  # Build every service image, warming the per-service BuildKit GHA cache that
  # docker-compose.ci.yml writes to. The e2e and push jobs read from it, so
  # their builds become cache hits.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service images
        run: >
          docker compose -f docker-compose.yml -f docker-compose.ci.yml
          build core odds notifications stats nginx keycloak

  # Boot the full stack from the just-built images and drive it with Playwright.
  # global-setup runs `compose up -d --build`; with CI set it layers in
  # docker-compose.ci.yml, so the build resolves from the cache the build job
  # populated.
  e2e:
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            services/core/node_modules
          key: node-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        run: pnpm install

      - name: Install Chromium
        uses: browser-actions/setup-chrome@v2

      - run: pnpm run e2e

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e/test-results/
          if-no-files-found: ignore
          retention-days: 14

  # Publish the validated images to GHCR. Only on pushes to main; PRs stop at
  # e2e. The build is a cache hit, so this just retags and pushes.
  # TODO(temporary): push-only gating is a stopgap — also run this on merged
  # PRs once the workflow is finalized.
  push:
    needs: e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image repo
        run: echo "IMAGE_REPO=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build and push images
        run: >
          docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.push.yml
          build core odds notifications stats nginx keycloak &&
          docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.push.yml
          push core odds notifications stats nginx keycloak
