name: PR checks

on:
  pull_request:
  push:
    branches: [main]

env:
  COMPOSE_BAKE: 'true'

jobs:
  # Everything that runs against the source tree without a built Docker image:
  # typecheck, lint, the JS/Python build (regenerates bindings) and unit tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v4
        with:
          node-version: '25'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            services/core/node_modules
          key: node-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Cache Python venvs
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: |
            services/odds/.venv
            services/notifications/.venv
            services/stats/.venv
          key: venv-${{ runner.os }}-py3.14-v2-${{ hashFiles('services/*/pyproject.toml', 'services/*/requirements.txt') }}

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      # --force so `turbo run init` actually executes: init has no cached
      # outputs, so a turbo cache hit replays its logs without recreating the
      # .venv directories. On this cache-miss path the venvs must really exist
      # before actions/cache saves them, or the next run restores empty dirs.
      - name: Install deps (cache miss only)
        if: steps.cache-node.outputs.cache-hit != 'true' || steps.cache-venv.outputs.cache-hit != 'true'
        run: pnpm install && pnpm exec turbo run init --force

      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run build
      - run: pnpm run test

  # Build every service image once. On main the images are pushed to GHCR under
  # an immutable :<sha> staging tag, so the push job can promote them by digest
  # instead of rebuilding. On PRs we only warm the per-service BuildKit GHA
  # cache (docker-compose.ci.yml) that the e2e job reuses.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service images (warm cache)
        if: github.ref != 'refs/heads/main'
        run: >
          docker compose -f docker-compose.yml -f docker-compose.ci.yml
          build core odds notifications stats nginx keycloak

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image repo
        if: github.ref == 'refs/heads/main'
        run: echo "IMAGE_REPO=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build and push staging images
        if: github.ref == 'refs/heads/main'
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: >
          docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.push.yml
          build --push core odds notifications stats nginx keycloak

  # Boot the full stack from the just-built images and drive it with Playwright.
  # global-setup runs `compose up -d --build`; with CI set it layers in
  # docker-compose.ci.yml, so the build resolves from the cache the build job
  # populated.
  e2e:
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            services/core/node_modules
          key: node-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        run: pnpm install

      - name: Install Chromium
        uses: browser-actions/setup-chrome@v2

      - run: pnpm run e2e

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e/test-results/
          if-no-files-found: ignore
          retention-days: 14

  # Promote the e2e-validated :<sha> staging images to :latest. This is a
  # registry-side manifest copy (docker buildx imagetools create) — no rebuild,
  # no layer transfer, so it runs in seconds. Only on pushes to main.
  # TODO(temporary): push-only gating is a stopgap — also run this on merged
  # PRs once the workflow is finalized.
  push:
    needs: e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote staging images to latest
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          for name in core odds notifications stats frontend keycloak; do
            docker buildx imagetools create -t "$repo/$name:latest" "$repo/$name:$IMAGE_TAG"
          done
