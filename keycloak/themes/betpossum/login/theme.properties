# BetPossum login theme — matches the frontend's Radix UI Themes identity
# (dark, accent=green, gray=sand, radius=small, Noto Sans).
#
# Extends keycloak.v2 so we keep PatternFly v5 layout and, crucially, the
# stable element ids the e2e suite drives (#username, #password, #kc-login).
# We inherit `stylesCommon` (PatternFly v5) and re-list the parent `css/styles.css`
# so the base look is preserved, then layer our Radix colors on top.
parent=keycloak.v2
import=common/keycloak

# Order: base styles -> Radix color scales (define --green-*/--sand-*) -> our overrides.
styles=css/styles.css css/green-dark.css css/green-dark-alpha.css css/sand-dark.css css/sand-dark-alpha.css css/login.css

# Force dark regardless of OS preference (the app forces dark via next-themes).
scripts=js/force-dark.js

# `login-pf` keeps the parent's body styling; `dark` activates the vendored
# Radix color scales, which are scoped to `.dark, .dark-theme`.
kcHtmlClass=login-pf dark
