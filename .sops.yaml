# SOPS rules for the prod secrets that Flux decrypts in-cluster.
#
# Only the secret payload fields (data / stringData) are encrypted; the
# structural keys (apiVersion/kind/metadata) stay readable so `kustomize build`
# can still parse the manifest before Flux's kustomize-controller decrypts it.
#
# The `age` recipient below is the PUBLIC key. Its matching PRIVATE key is never
# committed — it lives only as the `sops-age` Secret in the flux-system
# namespace (see k8s/README.md → "Continuous delivery"). Replace the CHANGE_ME
# recipient with your real age public key before encrypting.
creation_rules:
  - path_regex: k8s/overlays/prod/secrets\.enc\.yaml$
    encrypted_regex: '^(data|stringData)$'
    age: age1CHANGE_ME_REPLACE_WITH_YOUR_AGE_PUBLIC_KEY
