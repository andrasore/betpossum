# ─────────────────────────────────────────────────────────────────────────────
# Secrets — REPLACE every CHANGE_ME before applying.
#
# These are plain (unencrypted) Secret manifests with stringData for
# readability. Do NOT commit real values. In a real cluster, generate these out
# of band (Sealed Secrets, External Secrets Operator, SOPS, or the cloud
# provider's secret store) rather than checking them in.
#
# CONSISTENCY RULE: the password embedded in DATABASE_URL / RABBITMQ_URL below
# must match POSTGRES_PASSWORD / RABBITMQ_DEFAULT_PASS, and KC_DB_PASSWORD must
# match the keycloak-db POSTGRES_PASSWORD. They are duplicated because the apps
# consume a full connection URL while the servers consume discrete vars.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: betpossum-app-secrets
  namespace: betpossum
type: Opaque
stringData:
  # Consumed by core (and odds for DATABASE_URL).
  DATABASE_URL: postgresql://betting:CHANGE_ME_DB@postgres:5432/betting
  RABBITMQ_URL: amqp://betting:CHANGE_ME_MQ@rabbitmq:5672
  # Confidential client secret for betting-core's service account (Keycloak).
  KEYCLOAK_ADMIN_CLIENT_SECRET: CHANGE_ME_CORE_CLIENT_SECRET
  # Real odds providers — only needed if ODDS_PROVIDERS includes them.
  THE_ODDS_API_KEY: CHANGE_ME_OR_LEAVE
  APIFOOTBALL_API_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: betpossum
type: Opaque
stringData:
  POSTGRES_DB: betting
  POSTGRES_USER: betting
  POSTGRES_PASSWORD: CHANGE_ME_DB        # must match DATABASE_URL above
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: betpossum
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: betting
  RABBITMQ_DEFAULT_PASS: CHANGE_ME_MQ    # must match RABBITMQ_URL above
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-secret
  namespace: betpossum
type: Opaque
stringData:
  POSTGRES_DB: keycloak
  POSTGRES_USER: keycloak
  POSTGRES_PASSWORD: CHANGE_ME_KC_DB
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: betpossum
type: Opaque
stringData:
  KC_DB_PASSWORD: CHANGE_ME_KC_DB        # must match keycloak-db-secret
  KC_BOOTSTRAP_ADMIN_USERNAME: admin
  KC_BOOTSTRAP_ADMIN_PASSWORD: CHANGE_ME_KC_ADMIN
