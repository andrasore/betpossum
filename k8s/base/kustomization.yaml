# Environment-agnostic base. Not directly appliable — it carries no Secrets,
# Ingress, or keycloak-realm ConfigMap; those are inherently per-environment and
# live in the overlays (overlays/local, overlays/prod). The shared values here
# default to the production shape (https issuer, KC_HOSTNAME scheme); the local
# overlay patches the two spots that differ.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: betpossum
resources:
  - 00-namespace.yaml
  - 02-config.yaml
  - 10-postgres.yaml
  - 12-rabbitmq.yaml
  - 13-tigerbeetle.yaml
  - 20-keycloak.yaml
  - 30-core.yaml
  - 31-odds.yaml
  - 32-notifications.yaml
  - 33-stats.yaml
  - 40-nginx.yaml
