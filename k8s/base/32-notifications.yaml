# Notifications (Flask-SocketIO) — the browser's websocket fan-out point.
# Stateless: binds an exclusive queue to the notifications fanout and emits to
# the sockets connected to THIS replica.
#
# replicas: 1 — INTENTIONAL. Delivery itself is fan-out safe (each replica gets
# every event), but socket.io's HTTP long-polling handshake makes multiple
# requests that must all land on the same pod. nginx proxies /socket.io to this
# Service, which round-robins per connection, so >1 replica breaks the handshake.
# To scale: force websocket-only transport on the client AND add sticky upstream
# routing, or add a socket.io message-queue adapter — none of which are wired here.
apiVersion: v1
kind: Service
metadata:
  name: notifications
  namespace: betpossum
spec:
  selector:
    app: notifications
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
  namespace: betpossum
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      containers:
        - name: notifications
          image: ghcr.io/andrasore/betpossum/notifications:latest   # Dockerfile target: notifications
          envFrom:
            - configMapRef:
                name: betpossum-config
            - secretRef:
                name: betpossum-app-secrets
          ports:
            - containerPort: 8000
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
