# Public entry point. A single host routes everything to the nginx Service,
# which does the internal path-routing (incl. Keycloak under /kc) — so one
# Ingress host is enough. Shared by both overlays; only the per-environment
# bits live in the overlays:
#   - local → patches the host to `localhost` (plain HTTP, no TLS).
#   - prod  → keeps the host below and adds the cert-manager TLS block +
#             cluster-issuer annotation (see overlays/prod/kustomization.yaml
#             and overlays/prod/cluster-issuer.yaml).
#
# Assumes the NGINX Ingress Controller (nginx/nginx-ingress, the F5/NGINX Inc
# project — https://hub.docker.com/r/nginx/nginx-ingress/) is installed. The
# nginx.org/* annotations are specific to that controller; the community
# ingress-nginx ignores them.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: betpossum
  namespace: betpossum
  annotations:
    # Keep the live websocket (/socket.io) and Keycloak redirects healthy.
    nginx.org/proxy-read-timeout: "3600s"
    nginx.org/proxy-send-timeout: "3600s"
    # Keycloak login pages and tokens can be large; don't truncate buffers.
    # proxy-buffers must be enlarged to match: nginx derives proxy_busy_buffers_size
    # from proxy-buffer-size (2x = 32k here), which must stay below the total
    # proxy_buffers minus one buffer. The default (8 4k = 32k) is too small and
    # makes `nginx -t` fail, breaking the whole controller reload.
    nginx.org/proxy-buffer-size: "16k"
    nginx.org/proxy-buffers: "8 16k"
    # The NGINX Inc controller does NOT upgrade WebSocket connections by default —
    # each backend Service that needs it must be listed here, or /socket.io breaks.
    nginx.org/websocket-services: "nginx"
spec:
  ingressClassName: nginx
  rules:
    - host: betpossum.example.com     # CHANGE_ME (prod); local overlay patches this to localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
