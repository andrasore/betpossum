# The whole stack's database. One single-replica Postgres StatefulSet hosts both
# the `betting` database (a schema per app service: core/odds/stats) and
# Keycloak's separate `keycloak` database — matching the single-Postgres
# convention the docker-compose stack uses (see postgres/init.sql).
#
# The init ConfigMap below runs once, on first init of an empty data volume, as
# the bootstrap superuser. It creates Keycloak's role/database (password injected
# from keycloak-secret, so it stays out of the ConfigMap) and the app schemas.
#
# Production note: a single Postgres pod is a SPOF — for real HA use an operator
# (CloudNativePG / Zalando) or a managed instance instead.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: betpossum
data:
  # *.sh in /docker-entrypoint-initdb.d runs through the entrypoint shell, so the
  # Keycloak role password is interpolated from $KC_DB_PASSWORD (a Secret) rather
  # than committed here. Avoid single quotes in that password.
  init.sh: |
    #!/bin/sh
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      CREATE ROLE keycloak WITH LOGIN PASSWORD '${KC_DB_PASSWORD}';
      CREATE DATABASE keycloak OWNER keycloak;
      CREATE SCHEMA IF NOT EXISTS core  AUTHORIZATION ${POSTGRES_USER};
      CREATE SCHEMA IF NOT EXISTS odds  AUTHORIZATION ${POSTGRES_USER};
      CREATE SCHEMA IF NOT EXISTS stats AUTHORIZATION ${POSTGRES_USER};
    EOSQL
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: betpossum
spec:
  clusterIP: None            # headless: stable DNS `postgres` → the pod
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: betpossum
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: postgres-secret
          env:
            # Consumed by init.sh to set Keycloak's DB role password; kept in a
            # Secret rather than the init ConfigMap. Must match keycloak-secret's
            # KC_DB_PASSWORD, which Keycloak itself uses to connect.
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KC_DB_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER"]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: init
          configMap:
            name: postgres-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        # storageClassName: <your-class>   # omit to use the cluster default
        resources:
          requests:
            storage: 10Gi
