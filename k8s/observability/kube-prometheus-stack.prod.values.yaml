# Production overlay values for kube-prometheus-stack — layered OVER
# kube-prometheus-stack.values.yaml. Same Grafana Ingress as local, but on the
# real domain with TLS via cert-manager — reusing the prod `letsencrypt-prod`
# ClusterIssuer from k8s/overlays/prod/cluster-issuer.yaml.
#
# Fill in every CHANGE_ME before applying (keep the two host entries identical).
grafana:
  adminPassword: CHANGE_ME              # set a real password out of band
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.org/websocket-services: "kube-prometheus-stack-grafana"
      cert-manager.io/cluster-issuer: letsencrypt-prod
    path: /
    pathType: Prefix
    hosts:
      - grafana.example.com             # CHANGE_ME (must match the tls host)
    tls:
      - hosts:
          - grafana.example.com         # CHANGE_ME
        secretName: grafana-tls
