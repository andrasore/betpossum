# ─────────────────────────────────────────────────────────────────────────────
# Local-dev secrets. These are NON-SENSITIVE throwaway credentials — the same
# values the docker-compose dev stack uses — committed on purpose so
# `kubectl apply -k k8s/overlays/local` is self-contained. Never reuse these in
# any reachable environment; the prod overlay keeps CHANGE_ME placeholders.
#
# CONSISTENCY RULE: the password embedded in DATABASE_URL / RABBITMQ_URL must
# match POSTGRES_PASSWORD / RABBITMQ_DEFAULT_PASS. KC_DB_PASSWORD is the single
# source for the Keycloak DB role (postgres-init creates the role with it).
# KEYCLOAK_ADMIN_CLIENT_SECRET must match the betting-core client secret baked
# into keycloak/realm.json (betting-core-secret).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: betpossum-app-secrets
  namespace: betpossum
type: Opaque
stringData:
  DATABASE_URL: postgresql://betting:betting_dev@postgres:5432/betting
  RABBITMQ_URL: amqp://betting:betting_dev@rabbitmq:5672
  KEYCLOAK_ADMIN_CLIENT_SECRET: betting-core-secret
  THE_ODDS_API_KEY: ""
  APIFOOTBALL_API_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: betpossum
type: Opaque
stringData:
  POSTGRES_DB: betting
  POSTGRES_USER: betting
  POSTGRES_PASSWORD: betting_dev          # must match DATABASE_URL above
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: betpossum
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: betting
  RABBITMQ_DEFAULT_PASS: betting_dev       # must match RABBITMQ_URL above
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: betpossum
type: Opaque
stringData:
  KC_DB_PASSWORD: keycloak_dev
  KC_BOOTSTRAP_ADMIN_USERNAME: admin
  KC_BOOTSTRAP_ADMIN_PASSWORD: admin
