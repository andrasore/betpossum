# cert-manager ClusterIssuer for automatic TLS via Let's Encrypt (HTTP-01).
# Watched by the prod Ingress through its cert-manager.io/cluster-issuer
# annotation; cert-manager provisions the cert into the betpossum-tls Secret.
# Prod-only — the local overlay serves plain HTTP and omits this.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com          # CHANGE_ME: ACME registration / expiry notices
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
