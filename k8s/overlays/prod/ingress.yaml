# Public entry point (production). A single host routes everything to the nginx
# Service, which does the internal path-routing (incl. Keycloak under /kc) — so
# only ONE Ingress host is needed now that Keycloak is consolidated behind nginx.
#
# Assumes the NGINX Ingress Controller (nginx/nginx-ingress, the F5/NGINX Inc
# project — https://hub.docker.com/r/nginx/nginx-ingress/) + cert-manager are
# installed in the cluster. cert-manager watches this Ingress (via the
# cluster-issuer annotation in cluster-issuer.yaml) and provisions the TLS cert
# into the `betpossum-tls` Secret automatically.
#
# Alternative (no Ingress): set the nginx Service (base/40-nginx.yaml) to
# type: LoadBalancer and terminate TLS at the cloud LB or in nginx, then drop
# this overlay resource.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: betpossum
  namespace: betpossum
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Keep the live websocket (/socket.io) and Keycloak redirects healthy.
    nginx.org/proxy-read-timeout: "3600s"
    nginx.org/proxy-send-timeout: "3600s"
    # Keycloak login pages and tokens can be large; don't truncate buffers.
    nginx.org/proxy-buffer-size: "16k"
    # Unlike the community ingress-nginx, the NGINX Inc controller does NOT
    # upgrade WebSocket connections by default — each backend Service that needs
    # it must be listed here, or the /socket.io live channel falls back/breaks.
    nginx.org/websocket-services: "nginx"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - betpossum.example.com       # CHANGE_ME (must match PUBLIC_HOST)
      secretName: betpossum-tls
  rules:
    - host: betpossum.example.com     # CHANGE_ME
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
