# Production overlay: HTTPS via Ingress + cert-manager, CHANGE_ME secrets filled
# out of band. Base already carries the prod values (https issuer, KC_HOSTNAME
# scheme), so no config/keycloak patch is needed here.
#
#   kubectl apply -k k8s/overlays/prod
#
# Before applying, create the keycloak-realm ConfigMap out of band from a
# production realm (copy keycloak/realm.json -> realm.prod.json and swap the
# betting-frontend redirectUris/webOrigins/post-logout to the HTTPS domain):
#   kubectl -n betpossum create configmap keycloak-realm \
#     --from-file=realm.json=keycloak/realm.prod.json
# See ../../README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: betpossum
resources:
  - ../../base
  - cluster-issuer.yaml
  - secrets.yaml

patches:
  # The shared Ingress (base/50-ingress.yaml) carries the routing + annotations
  # and already defaults to the prod host (betpossum.example.com — CHANGE_ME,
  # must match PUBLIC_HOST and the tls host below). Prod adds TLS: cert-manager
  # watches this Ingress via the cluster-issuer annotation and provisions the
  # cert into the betpossum-tls Secret.
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: betpossum
        namespace: betpossum
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
      spec:
        tls:
          - hosts:
              - betpossum.example.com       # CHANGE_ME (must match the rules host)
            secretName: betpossum-tls
