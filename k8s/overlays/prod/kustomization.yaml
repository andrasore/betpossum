# Production overlay (generic example): HTTPS via Ingress on top of the base.
#
# This overlay is deployment-independent — it carries no secrets, no real domain,
# and no pinned image tags. It is the reusable base that a private config repo
# layers the actual deployment onto (real host, SOPS-encrypted secrets, and
# Flux-managed image pins); see ../../README.md → "Continuous delivery". Applied
# on its own it builds cleanly (Deployments + Ingress + config), but the pods need
# secrets you supply — either via that private overlay or out of band
# (`kubectl create secret`).
#
# Base already carries the prod values (https issuer, KC_HOSTNAME scheme), so no
# config/keycloak patch is needed here. Images stay at the base default (:latest);
# a real deployment pins a published tag instead of trusting :latest.
#
# TLS model: the controller serves a TLS cert you provide in the betpossum-tls
# Secret. Where that cert comes from is deployment-specific — a cert from your own
# CA, or an origin cert issued by whatever CDN / load balancer fronts the cluster.
# No cert-manager / ACME is involved; nothing provisions the cert in-cluster.
#
#   kubectl apply -k k8s/overlays/prod
#
# Before applying, create the keycloak-realm ConfigMap out of band from a
# production realm (copy keycloak/realm.json -> realm.prod.json and swap the
# betting-frontend redirectUris/webOrigins/post-logout to the HTTPS domain):
#   kubectl -n betpossum create configmap keycloak-realm \
#     --from-file=realm.json=keycloak/realm.prod.json
# See ../../README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: betpossum
resources:
  - ../../base

patches:
  # The shared Ingress (base/50-ingress.yaml) carries the routing + annotations
  # and already defaults to the prod host (betpossum.example.com — CHANGE_ME,
  # must match PUBLIC_HOST and the tls host below). Prod adds TLS: the controller
  # serves the cert from the betpossum-tls Secret, which you populate yourself
  # (sealed) — there is no cert-manager annotation because nothing provisions
  # this cert in-cluster.
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: betpossum
        namespace: betpossum
      spec:
        tls:
          - hosts:
              - betpossum.example.com       # CHANGE_ME (must match the rules host)
            secretName: betpossum-tls
