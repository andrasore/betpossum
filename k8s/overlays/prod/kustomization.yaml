# Production overlay: HTTPS via Ingress, secrets sealed against the cluster's
# Sealed Secrets key. Base already carries the prod values (https issuer,
# KC_HOSTNAME scheme), so no config/keycloak patch is needed here.
#
# TLS model: the controller serves a TLS cert you provide, sealed into the
# betpossum-tls Secret alongside the app secrets (see ../../README.md → "3. (prod)
# Seal the secrets"). Where that cert comes from is deployment-specific — a cert
# from your own CA, or an origin cert issued by whatever CDN / load balancer
# fronts the cluster. No cert-manager / ACME is involved; nothing provisions the
# cert in-cluster.
#
#   kubectl apply -k k8s/overlays/prod
#
# sealed-secrets.yaml is generated locally by kubeseal and is gitignored: it is
# sealed against one specific cluster's key, and this repo stays independent of
# any concrete deployment. It is listed under `resources`, so `kustomize build`
# fails until you generate it — see ../../README.md → "3. (prod) Seal the
# secrets".
#
# Before applying, create the keycloak-realm ConfigMap out of band from a
# production realm (copy keycloak/realm.json -> realm.prod.json and swap the
# betting-frontend redirectUris/webOrigins/post-logout to the HTTPS domain):
#   kubectl -n betpossum create configmap keycloak-realm \
#     --from-file=realm.json=keycloak/realm.prod.json
# See ../../README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: betpossum
resources:
  - ../../base
  - sealed-secrets.yaml

# Image tags for the seven custom images. Base pins :latest (env-agnostic); prod
# overrides them here so the manifest names one identifiable build. `:latest`
# cannot be used in prod: Keel decides what "newer" means by parsing the tag on
# the live Deployment as semver, and `latest` gives it nothing to compare.
# `frontend` is the nginx Deployment's image.
#
# CI stamps all seven images with the same tag in one promote step, so the tags
# below move together.
#
# CHANGE_ME: set these to a semver tag CI has actually published — a tag that
# does not exist in GHCR lands the pods in ImagePullBackOff. See ../../README.md
# → "Continuous delivery" for finding the newest one. Keel owns these tags
# in-cluster after the first apply, so expect git to fall behind the cluster;
# the README covers what re-applying this overlay does.
images:
  - name: ghcr.io/andrasore/betpossum/core
    newTag: 0.1.0
  - name: ghcr.io/andrasore/betpossum/odds
    newTag: 0.1.0
  - name: ghcr.io/andrasore/betpossum/notifications
    newTag: 0.1.0
  - name: ghcr.io/andrasore/betpossum/stats
    newTag: 0.1.0
  - name: ghcr.io/andrasore/betpossum/frontend
    newTag: 0.1.0
  - name: ghcr.io/andrasore/betpossum/keycloak
    newTag: 0.1.0
  - name: ghcr.io/andrasore/betpossum/bots
    newTag: 0.1.0

patches:
  # Hand the seven CI-built images to Keel: it polls GHCR and patches the newest
  # published semver straight onto the live Deployment. `major` means "accept any
  # newer semver" — it is not limited to major bumps. `patch` would also work
  # while every release is a 0.1.x bump, but it silently ignores anything outside
  # the series, so a hand-bump to 0.2.0 would stop deploys with no error.
  #
  # This targets every Deployment in the stack, which is exactly the seven CI-built
  # ones — postgres/rabbitmq/tigerbeetle are StatefulSets on upstream tags, so
  # they are untouched. A third-party Deployment added later would need excluding
  # here. Annotations are created wholesale because no base Deployment sets any.
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          keel.sh/policy: major
          keel.sh/trigger: poll
          keel.sh/pollSchedule: "@every 5m"
  # The shared Ingress (base/50-ingress.yaml) carries the routing + annotations
  # and already defaults to the prod host (betpossum.example.com — CHANGE_ME,
  # must match PUBLIC_HOST and the tls host below). Prod adds TLS: the controller
  # serves the cert from the betpossum-tls Secret, which you populate yourself
  # (sealed) — there is no cert-manager annotation because nothing provisions
  # this cert in-cluster.
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: betpossum
        namespace: betpossum
      spec:
        tls:
          - hosts:
              - betpossum.example.com       # CHANGE_ME (must match the rules host)
            secretName: betpossum-tls
