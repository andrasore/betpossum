syntax = "proto3";

package betting.events;

// Odds Service → Core API
message OddsUpdatedEvent {
  string event_id   = 1;
  string sport      = 2;
  string home_team  = 3;
  string away_team  = 4;
  double home_odds  = 5;
  double away_odds  = 6;
  double draw_odds  = 7; // 0.0 when no draw market (e.g. basketball)
  int64  updated_at = 8; // Unix ms
}

enum Outcome {
  OUTCOME_UNSPECIFIED = 0;
  OUTCOME_HOME = 1;
  OUTCOME_AWAY = 2;
  OUTCOME_DRAW = 3;
}

// Odds Service or Admin → Core API.
// Signals that a sports event has concluded with a known outcome. Core
// consumes this to settle any held bets on the event.
message EventResolvedEvent {
  string  event_id    = 1;
  string  sport       = 2;
  Outcome outcome     = 3;
  int64   resolved_at = 4; // Unix ms
}

// Core API → Notifications Service.
// Per-user notification: a bet entered the held state.
message BetHeldNotification {
  string bet_id = 1;
}

// Core API → Notifications Service.
// Per-user notification: a bet was settled. `payout` is profit only
// (matches Bet.payout semantics — see bets.service.ts).
message BetSettledNotification {
  string bet_id = 1;
  bool   won    = 2;
  double payout = 3;
}

// Core API → Notifications Service.
// Per-user notification: wallet balance changed (in dollars, not cents).
message BalanceUpdatedNotification {
  double balance = 1;
}

// Core API → Notifications Service.
// Per-user notification: a bet placement was rejected because the
// requested stake exceeded the user's available balance.
message InsufficientBalanceNotification {
  double stake   = 1;
  double balance = 2;
}

// Any service → Notifications Service.
// Fire-and-forget envelope; `user_id` empty means broadcast.
message NotificationEvent {
  string user_id = 1;
  oneof body {
    OddsUpdatedEvent               odds_updated         = 2;
    BetHeldNotification            bet_held             = 3;
    BetSettledNotification         bet_settled          = 4;
    BalanceUpdatedNotification     balance_updated      = 5;
    InsufficientBalanceNotification insufficient_balance = 6;
  }
}
