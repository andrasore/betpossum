services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  # Single Postgres instance for the whole stack. The init script provisions
  # Keycloak's separate `keycloak` database plus a schema per app service
  # (core/odds/stats) inside this `betting` database. It runs only on a fresh
  # data volume — `docker compose down -v` to re-provision.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: betting
      POSTGRES_USER: betting
      POSTGRES_PASSWORD: betting_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betting"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: betting
      RABBITMQ_DEFAULT_PASS: betting_dev
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.17.3
    # Enable the builtin init script "tini" bc SIGTERM handling is not implemented in TigerBeetle
    # Required for graceful shutdown
    # https://github.com/tigerbeetle/tigerbeetle/issues/136
    init: true
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "/tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle 2>/dev/null || true &&
       exec /tigerbeetle start --addresses=0.0.0.0:6000 --development /data/0_0.tigerbeetle"
    volumes:
      - tigerbeetle_data:/data
    ports:
      - "6000:6000"
    security_opt:
      - seccomp=unconfined  # TigerBeetle requires io_uring; Docker's default seccomp profile blocks it
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1770' /proc/net/tcp || grep -q ':1770' /proc/net/tcp6"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  keycloak:
    build: ./keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_dev
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Browser-facing base URL is the single nginx origin, with Keycloak under
      # the /kc path prefix. KC_HOSTNAME must include that path so generated
      # links (issuer, login-action form posts) carry /kc; KC_HTTP_RELATIVE_PATH
      # makes the server actually serve there. No published port of its own —
      # it is reached only through nginx now.
      KC_HOSTNAME: http://localhost:8080/kc
      KC_HTTP_RELATIVE_PATH: /kc
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ── Application Services ───────────────────────────────────────────────────

  core:
    build:
      context: .
      target: core
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://betting:betting_dev@postgres:5432/betting
      DB_SCHEMA: core
      RABBITMQ_URL: amqp://betting:betting_dev@rabbitmq:5672
      TIGERBEETLE_ADDRESS: tigerbeetle:6000
      TIGERBEETLE_CLUSTER_ID: "0"
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/kc
      KEYCLOAK_ISSUER_URL: http://localhost:8080/kc/realms/betting
      KEYCLOAK_REALM: betting
      KEYCLOAK_ADMIN_CLIENT_ID: betting-core
      KEYCLOAK_ADMIN_CLIENT_SECRET: betting-core-secret
    ports:
      - "4000:4000"
    security_opt:
      - seccomp=unconfined  # TigerBeetle requires io_uring; Docker's default seccomp profile blocks it
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      tigerbeetle:
        condition: service_healthy
      keycloak:
        condition: service_started

  odds:
    build:
      context: .
      target: odds
    environment:
      RABBITMQ_URL: amqp://betting:betting_dev@rabbitmq:5672
      DATABASE_URL: postgresql://betting:betting_dev@postgres:5432/betting
      DB_SCHEMA: odds
      ODDS_PROVIDERS: ${ODDS_PROVIDERS:-mock}
      ODDS_STORAGE: postgres
      POLL_INTERVAL_SECONDS: 3000
      # Real providers (disabled in dev by default; add to ODDS_PROVIDERS to enable):
      THE_ODDS_API_KEY: ${THE_ODDS_API_KEY:-demo}
      APIFOOTBALL_API_KEY: ${APIFOOTBALL_API_KEY:-}
      APIFOOTBALL_LEAGUES: ${APIFOOTBALL_LEAGUES:-421}
      APIFOOTBALL_SEASON: ${APIFOOTBALL_SEASON:-2023}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/kc
      KEYCLOAK_ISSUER_URL: http://localhost:8080/kc/realms/betting
      KEYCLOAK_REALM: betting
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  notifications:
    build:
      context: .
      target: notifications
    environment:
      RABBITMQ_URL: amqp://betting:betting_dev@rabbitmq:5672
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/kc
      KEYCLOAK_ISSUER_URL: http://localhost:8080/kc/realms/betting
      KEYCLOAK_REALM: betting
    depends_on:
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started

  stats:
    build:
      context: .
      target: stats
    environment:
      RABBITMQ_URL: amqp://betting:betting_dev@rabbitmq:5672
      DATABASE_URL: postgresql://betting:betting_dev@postgres:5432/betting
      DB_SCHEMA: stats
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/kc
      KEYCLOAK_ISSUER_URL: http://localhost:8080/kc/realms/betting
      KEYCLOAK_REALM: betting
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  nginx:
    build:
      context: .
      target: frontend
    ports:
      - "8080:80"
    depends_on:
      - core
      - notifications
      - odds
      - stats
      - keycloak

  # Dev-only play-data generator: provisions bot users on the fly via the
  # Keycloak admin API, funds them through the app admin, and places bets via
  # the single nginx origin. It waits for the stack to be ready and restarts on
  # failure, so boot ordering is best-effort. Excluded from the e2e stack (see
  # docker-compose.e2e.yml).
  bots:
    build:
      context: .
      target: bots
    environment:
      BOT_BASE_URL: http://nginx
      KC_ADMIN: admin
      KC_ADMIN_PASSWORD: admin
      ADMIN_USER: bob
      ADMIN_PASSWORD: password
      BOT_COUNT: ${BOT_COUNT:-10}
    depends_on:
      - nginx
      - core
      - odds
      - keycloak

volumes:
  postgres_data:
  tigerbeetle_data:
