services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: betting
      POSTGRES_USER: betting
      POSTGRES_PASSWORD: betting_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betting"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.17.3
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "/tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle 2>/dev/null || true &&
       /tigerbeetle start --addresses=0.0.0.0:6000 /data/0_0.tigerbeetle"
    volumes:
      - tigerbeetle_data:/data
    ports:
      - "6000:6000"
    security_opt:
      - seccomp=unconfined  # TigerBeetle requires io_uring; Docker's default seccomp profile blocks it
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1770' /proc/net/tcp || grep -q ':1770' /proc/net/tcp6"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── Application Services ───────────────────────────────────────────────────

  core:
    build:
      context: .
      target: core
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://betting:betting_dev@postgres:5432/betting
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_prod
      JWT_EXPIRES_IN: 7d
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  odds:
    build:
      context: .
      target: odds
    environment:
      REDIS_URL: redis://redis:6379
      THE_ODDS_API_KEY: ${THE_ODDS_API_KEY:-demo}
      POLL_INTERVAL_SECONDS: 30
      MOCK: "true"
    depends_on:
      redis:
        condition: service_healthy

  wallet:
    build:
      context: .
      target: wallet
    environment:
      REDIS_URL: redis://redis:6379
      TIGERBEETLE_ADDRESS: tigerbeetle:6000
    security_opt:
      - seccomp=unconfined  # TigerBeetle requires io_uring; Docker's default seccomp profile blocks it
    depends_on:
      redis:
        condition: service_healthy
      tigerbeetle:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - core
      - wallet

  frontend:
    build:
      context: .
      target: frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - nginx

volumes:
  postgres_data:
  tigerbeetle_data:

